<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick form · Socially Soch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:        #2F1A0E;
  --bg-card:   #3F2418;
  --bg-card-2: #4A2C1E;
  --border:    rgba(187,148,87,0.26);
  --tan:       #BB9457;
  --text:      #F5E5C4;
  --text-soft: rgba(245,229,196,0.72);
  --text-mute: rgba(245,229,196,0.45);
  --burgundy:  #6F1D1B;
  --burgundy-2:#8A2826;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;
}

.wrap{
  max-width:640px;
  margin:0 auto;
  min-height:100vh;
  display:flex;flex-direction:column;
  padding:24px 24px 32px;
}

.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0 10px;
}
.wordmark{font-weight:600;font-size:14px;letter-spacing:0.04em;color:var(--text)}
.progress-text{font-size:12px;letter-spacing:0.06em;color:var(--text-mute)}

.progress-bar{
  position:relative;height:3px;
  background:rgba(187,148,87,0.18);
  border-radius:2px;overflow:hidden;
  margin-bottom:28px;
}
.progress-bar .fill{
  position:absolute;top:0;left:0;bottom:0;
  background:var(--tan);
  width:0%;
  transition:width 0.4s ease;
}

.stage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0}

.greeting{
  font-size:14px;color:var(--text-soft);
  margin-bottom:18px;
}

.q-label{
  display:block;font-size:22px;font-weight:600;
  margin-bottom:10px;color:var(--text);line-height:1.35;
}
.q-help{
  font-size:14px;color:var(--text-soft);
  margin-bottom:24px;line-height:1.55;
}

.opts{display:flex;flex-direction:column;gap:8px}

.opt{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 14px;
  cursor:pointer;
  display:flex;align-items:flex-start;gap:12px;
  transition:border-color 0.15s, background 0.15s;
}
.opt:hover{border-color:var(--tan);background:var(--bg-card-2)}
.opt.selected{border-color:var(--tan);background:rgba(187,148,87,0.10)}

.opt .mark{
  width:16px;height:16px;border-radius:50%;
  border:1px solid var(--border);flex-shrink:0;margin-top:2px;
  transition:all 0.15s;
}
.opt.selected .mark{
  border-color:var(--tan);background:var(--tan);
  box-shadow:inset 0 0 0 3px var(--bg-card);
}

.opt .text{font-size:14px;color:var(--text);line-height:1.4;flex:1}
.opt .text .sub{
  display:block;font-size:12px;color:var(--text-mute);margin-top:3px;
}

.text-input,
.text-area,
.other-input{
  width:100%;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 14px;
  color:var(--text);
  font-family:inherit;font-size:14px;
}
.text-input,
.text-area{margin-top:0}
.other-input{margin-top:8px}
.text-area{
  min-height:140px;
  resize:vertical;
  line-height:1.55;
}
.text-input:focus,
.text-area:focus,
.other-input:focus{outline:none;border-color:var(--tan)}
.text-input::placeholder,
.text-area::placeholder,
.other-input::placeholder{color:var(--text-mute)}
.other-input.hidden{display:none}

.navrow{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:24px;margin-top:24px;border-top:1px solid var(--border);
}
.back{
  background:none;border:none;color:var(--text-mute);
  font-family:inherit;font-size:14px;cursor:pointer;padding:6px 0;
}
.back:hover{color:var(--text)}
.back:disabled{color:var(--text-mute);opacity:0.4;cursor:not-allowed}
.next{
  background:var(--burgundy);color:var(--text);
  border:none;border-radius:6px;padding:10px 24px;
  font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;
  transition:background 0.15s;
}
.next:hover{background:var(--burgundy-2)}
.next:disabled{
  background:var(--bg-card);color:var(--text-mute);cursor:not-allowed;
}

.center{
  flex:1;display:flex;flex-direction:column;justify-content:center;
}
.center h1{font-size:26px;font-weight:600;margin-bottom:10px}
.center p{color:var(--text-soft);margin-bottom:20px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--text-soft);margin-bottom:6px}
.field input{
  width:100%;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:10px 12px;
  color:var(--text);
  font-family:inherit;font-size:14px;
}
.field input:focus{outline:none;border-color:var(--tan)}

@media (max-width:560px){
  .q-label{font-size:20px}
  .center h1{font-size:22px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="wordmark">Socially Soch</div>
    <div class="progress-text" id="progressText"></div>
  </div>
  <div class="progress-bar" id="progressBar">
    <div class="fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="stage" id="stage"></div>

  <div class="navrow" id="navrow" style="display:none">
    <button class="back" id="backBtn" type="button">Back</button>
    <button class="next" id="nextBtn" type="button">Continue</button>
  </div>

</div>

<script>
const CONFIG = {
  clientName: "Aaryan",
  appsScriptUrl: "https://script.google.com/macros/s/AKfycbz2Hdiw6UIsTOvcwNov5lOqa8V0M3eHKZs1LD9d4ryj2pcsoBry2V6v2qPWlsWPTJ9c5Q/exec"
};

const OTHER = "__other__";

const QUESTIONS = [
  {
    key: "model",
    label: "What kind of business are you setting up?",
    help: "No single right answer here. This is the first thing we will help you figure out.",
    type: "single",
    allowOther: true,
    options: [
      { v: "multibrand",  l: "Multi-brand retail showroom", sub: "Curate other brands under one roof, like Address Home or Pure Concept Home" },
      { v: "distributor", l: "Distributor for international brands", sub: "Sell B2B to architects and other retailers, like Sources Unlimited" },
      { v: "ownbrand",    l: "Your own brand store", sub: "Your products under your own brand, in your own space" },
      { v: "hybrid",      l: "Own brand plus distribute select brands", sub: "Private label plus curated mix, the Address Home model" },
      { v: "figuring",    l: "Still figuring this out" }
    ]
  },
  {
    key: "stage",
    label: "Where are you in the journey right now?",
    type: "single",
    allowOther: true,
    options: [
      { v: "exploring", l: "Just exploring, no commitments yet" },
      { v: "concept",   l: "Concept locked, planning the launch" },
      { v: "deals",     l: "Talking to brands or suppliers, deals in motion" },
      { v: "tieups",    l: "Brand or supply tie ups locked, planning the store" },
      { v: "space",     l: "Store space identified, ready to fit out" }
    ]
  },
  {
    key: "categories",
    label: "Which categories will the store carry?",
    help: "Pick everything you are seriously considering.",
    type: "multi",
    allowOther: true,
    options: [
      { v: "bath",      l: "Bath fittings", sub: "Faucets, showers, sanitaryware" },
      { v: "wardrobes", l: "Wardrobes and storage" },
      { v: "kitchen",   l: "Kitchen and appliances" },
      { v: "furniture", l: "Furniture", sub: "Living, dining, bedroom" },
      { v: "lighting",  l: "Lighting" },
      { v: "decor",     l: "Home decor and accessories" },
      { v: "hardware",  l: "Hardware and finishes", sub: "Handles, knobs, surface finishes" },
      { v: "all",       l: "All of the above, a full lifestyle destination" }
    ]
  },
  {
    key: "customer",
    label: "Who is the main customer?",
    type: "single",
    allowOther: true,
    options: [
      { v: "architects",  l: "Architects and interior designers", sub: "They specify your products for HNI projects" },
      { v: "homeowners",  l: "HNI homeowners directly", sub: "Walk ins and referrals" },
      { v: "builders",    l: "Builders and developers", sub: "Luxury residential and hotel projects" },
      { v: "hospitality", l: "Boutique hotels and hospitality" },
      { v: "mix",         l: "A mix of all the above" }
    ]
  },
  {
    key: "reference",
    label: "Name a brand you admire or want to position yours like",
    help: "Could be Indian or international. Could be a direct competitor or a brand you respect. Take a moment to think, or quickly search a few names. Examples to spark thought: Address Home, Pure Concept Home, Beyond Designs, FormeStore, Sources Unlimited, Restoration Hardware, The Conran Shop, B&B Italia, Roche Bobois. Or something else entirely.",
    type: "text",
    placeholder: "Type one or two brand names"
  },
  {
    key: "design",
    label: "What design language do you lean towards?",
    type: "single",
    allowOther: true,
    options: [
      { v: "minimal",  l: "Modern minimal", sub: "Clean lines, neutral palette, metal finishes" },
      { v: "european", l: "Classic European luxury", sub: "Brass, marble, ornate detailing" },
      { v: "italian",  l: "Italian contemporary", sub: "Sculptural, sleek, refined" },
      { v: "indian",   l: "Indian craft plus modern", sub: "Local materials and forms with a contemporary feel" },
      { v: "japanese", l: "Japanese wellness", sub: "Restraint, water, ritual, wabi sabi" },
      { v: "eclectic", l: "Eclectic mix", sub: "Curated tension across styles" },
      { v: "tech",     l: "Tech forward", sub: "Smart home, sensor based, futuristic" }
    ]
  },
  {
    key: "storeExperience",
    label: "What experience should your customer have when they walk into the store?",
    help: "Forget the location for now. Tell us how it should feel.",
    type: "single",
    allowOther: true,
    options: [
      { v: "gallery",  l: "A boutique gallery", sub: "Curated, quiet, art led" },
      { v: "flagship", l: "A grand flagship", sub: "Immersive, theatrical, statement piece" },
      { v: "studio",   l: "A studio with a private appointment area", sub: "Architects and designers come for closed sessions" },
      { v: "lounge",   l: "A relaxed lounge", sub: "Seating, coffee, ambient music, slow conversations" },
      { v: "magazine", l: "Like walking into a magazine spread", sub: "Curated set pieces, room after room" },
      { v: "hotel",    l: "A luxury hotel lobby feel", sub: "Hospitality grade service and attention" }
    ]
  },
  {
    key: "services",
    label: "What do you need from us?",
    help: "We work as one senior team that handles the whole brand: identity, content, shoots, ads, partnerships, PR, launch event, store branding, website. Tell us in your own words what you need from this team, or what kind of people you imagine sitting on it.",
    type: "textarea",
    placeholder: "Write here. As much detail as you want."
  },
  {
    key: "spend",
    label: "What monthly figure do you have in mind?",
    help: "For branding and marketing. Type any number, any range, in any words. We will design the engagement around what you share.",
    type: "text",
    placeholder: "Type whatever feels right"
  }
];

const TOTAL_Q = QUESTIONS.length;

const state = {
  step: 0,
  answers: {},     // key -> value (string, array, or text)
  others: {},      // key -> free text from Other field
  user: { name: CONFIG.clientName, phone: "", email: "", ig: "" }
};

const stageEl = document.getElementById("stage");
const navrowEl = document.getElementById("navrow");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");
const progressBar = document.getElementById("progressBar");

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function updateProgress() {
  if (state.step < TOTAL_Q) {
    const idx = state.step;
    const pct = (idx / TOTAL_Q) * 100;
    progressFill.style.width = pct + "%";
    progressText.textContent = (idx + 1) + " of " + TOTAL_Q;
    progressBar.style.display = "block";
  } else if (state.step === TOTAL_Q) {
    progressFill.style.width = "100%";
    progressText.textContent = "Last bit";
    progressBar.style.display = "block";
  } else {
    progressBar.style.display = "none";
    progressText.textContent = "";
  }
}

function render() {
  if (state.step < TOTAL_Q) return renderQuestion(state.step);
  if (state.step === TOTAL_Q) return renderContact();
  return renderClosing();
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  navrowEl.style.display = "flex";
  updateProgress();

  let html = "";

  if (idx === 0) {
    html += '<div class="greeting">Hey ' + escapeHtml(CONFIG.clientName) + '.</div>';
  }

  html += '<label class="q-label">' + q.label + '</label>';
  if (q.help) html += '<div class="q-help">' + q.help + '</div>';

  if (q.type === "text") {
    const val = escapeHtml(state.answers[q.key] || "");
    html += '<input class="text-input" type="text" data-key="' + q.key + '" placeholder="' + escapeHtml(q.placeholder || "") + '" value="' + val + '">';
  } else if (q.type === "textarea") {
    const val = escapeHtml(state.answers[q.key] || "");
    html += '<textarea class="text-area" data-key="' + q.key + '" placeholder="' + escapeHtml(q.placeholder || "") + '">' + val + '</textarea>';
  } else {
    html += '<div class="opts" data-key="' + q.key + '" data-type="' + q.type + '">';
    const selected = state.answers[q.key] || (q.type === "multi" ? [] : "");

    q.options.forEach(opt => {
      const isSel = q.type === "multi" ? selected.indexOf(opt.v) !== -1 : selected === opt.v;
      html +=
        '<div class="opt' + (isSel ? ' selected' : '') + '" data-v="' + opt.v + '">' +
          '<div class="mark"></div>' +
          '<div class="text">' + opt.l + (opt.sub ? '<span class="sub">' + opt.sub + '</span>' : '') + '</div>' +
        '</div>';
    });

    if (q.allowOther) {
      const otherSel = q.type === "multi" ? selected.indexOf(OTHER) !== -1 : selected === OTHER;
      html +=
        '<div class="opt' + (otherSel ? ' selected' : '') + '" data-v="' + OTHER + '">' +
          '<div class="mark"></div>' +
          '<div class="text">Something else</div>' +
        '</div>';
      const otherVal = escapeHtml(state.others[q.key] || "");
      const hidden = otherSel ? "" : " hidden";
      html += '<input class="other-input' + hidden + '" type="text" data-key="' + q.key + '" placeholder="Type your answer here" value="' + otherVal + '">';
    }

    html += '</div>';
  }

  stageEl.innerHTML = html;
  bindQuestion(q);
  updateNav(q, idx);
}

function bindQuestion(q) {
  // Text input
  const textInp = stageEl.querySelector(".text-input");
  if (textInp) {
    textInp.addEventListener("input", (e) => {
      state.answers[q.key] = e.target.value;
      updateNav(q, state.step);
    });
  }
  // Textarea
  const textArea = stageEl.querySelector(".text-area");
  if (textArea) {
    textArea.addEventListener("input", (e) => {
      state.answers[q.key] = e.target.value;
      updateNav(q, state.step);
    });
  }
  // MCQ
  const optsEl = stageEl.querySelector(".opts");
  if (optsEl) {
    optsEl.querySelectorAll(".opt").forEach(optEl => {
      optEl.addEventListener("click", () => {
        const v = optEl.dataset.v;
        if (q.type === "single") {
          state.answers[q.key] = v;
          optsEl.querySelectorAll(".opt").forEach(o => o.classList.remove("selected"));
          optEl.classList.add("selected");
          toggleOther(optsEl, v === OTHER);
        } else {
          const cur = state.answers[q.key] ? state.answers[q.key].slice() : [];
          const i = cur.indexOf(v);
          if (i >= 0) {
            cur.splice(i, 1);
            optEl.classList.remove("selected");
          } else {
            cur.push(v);
            optEl.classList.add("selected");
          }
          state.answers[q.key] = cur;
          toggleOther(optsEl, cur.indexOf(OTHER) !== -1);
        }
        updateNav(q, state.step);
      });
    });
    const otherInp = optsEl.querySelector(".other-input");
    if (otherInp) {
      otherInp.addEventListener("input", (e) => {
        state.others[q.key] = e.target.value;
        updateNav(q, state.step);
      });
    }
  }
}

function toggleOther(optsEl, show) {
  const otherInp = optsEl.querySelector(".other-input");
  if (!otherInp) return;
  if (show) otherInp.classList.remove("hidden");
  else      otherInp.classList.add("hidden");
}

function isAnswered(q) {
  const a = state.answers[q.key];
  if (q.type === "text" || q.type === "textarea") return typeof a === "string" && a.trim().length > 0;
  if (q.type === "single") return !!a;
  if (q.type === "multi")  return Array.isArray(a) && a.length > 0;
  return false;
}

function updateNav(q, idx) {
  const ok = isAnswered(q);
  nextBtn.disabled = !ok;
  nextBtn.textContent = "Continue";
  backBtn.disabled = idx === 0;

  backBtn.onclick = () => {
    if (idx === 0) return;
    state.step--; render(); window.scrollTo({ top: 0, behavior: "smooth" });
  };
  nextBtn.onclick = () => {
    if (nextBtn.disabled) return;
    state.step++; render(); window.scrollTo({ top: 0, behavior: "smooth" });
  };
}

function renderContact() {
  navrowEl.style.display = "flex";
  updateProgress();

  stageEl.innerHTML =
    '<label class="q-label">Your details</label>' +
    '<div class="q-help">Last step. We will use this to send your brief response within 48 hours.</div>' +
    '<div class="field"><label>Name</label><input id="fName"  type="text"  value="' + escapeHtml(state.user.name)  + '"/></div>' +
    '<div class="field"><label>Phone</label><input id="fPhone" type="tel"   placeholder="+91" value="' + escapeHtml(state.user.phone) + '"/></div>' +
    '<div class="field"><label>Email</label><input id="fEmail" type="email" placeholder="you@brand.com" value="' + escapeHtml(state.user.email) + '"/></div>' +
    '<div class="field"><label>Instagram handle, if you have one</label><input id="fIg" type="text" placeholder="@brandhandle" value="' + escapeHtml(state.user.ig) + '"/></div>';

  nextBtn.disabled = false;
  nextBtn.textContent = "Send";
  backBtn.disabled = false;
  backBtn.onclick = () => { state.step--; render(); window.scrollTo({ top: 0, behavior: "smooth" }); };
  nextBtn.onclick = submit;
}

function renderClosing() {
  navrowEl.style.display = "none";
  updateProgress();
  stageEl.innerHTML =
    '<div class="center">' +
      '<h1>Thanks ' + escapeHtml(state.user.name || CONFIG.clientName) + '.</h1>' +
      '<p>We will get back to you within 48 hours with first thoughts on what we have read.</p>' +
    '</div>';
}

function submit() {
  const name  = document.getElementById("fName").value.trim()  || CONFIG.clientName;
  const phone = document.getElementById("fPhone").value.trim();
  const email = document.getElementById("fEmail").value.trim();
  const ig    = document.getElementById("fIg").value.trim();

  if (!email) {
    document.getElementById("fEmail").focus();
    nextBtn.textContent = "Email needed";
    setTimeout(() => { nextBtn.textContent = "Send"; }, 1500);
    return;
  }

  state.user = { name: name, phone: phone, email: email, ig: ig };

  const questionLabels = {};
  const questionSections = {};
  const questionOrder = [];
  const optionLabels = {};

  QUESTIONS.forEach((q) => {
    questionLabels[q.key]   = q.label;
    questionSections[q.key] = "Brief";
    questionOrder.push(q.key);
    if (q.options) {
      optionLabels[q.key] = {};
      q.options.forEach(o => { optionLabels[q.key][o.v] = o.l; });
      optionLabels[q.key][OTHER] = "Something else";
    }
  });

  function resolveCode(key, code) {
    if (code === OTHER) {
      const t = (state.others[key] || "").trim();
      return t.length ? t : "Something else";
    }
    return (optionLabels[key] && optionLabels[key][code]) || code;
  }

  const answersText = {};
  Object.keys(state.answers).forEach(k => {
    const v = state.answers[k];
    if (Array.isArray(v)) {
      answersText[k] = v.map(x => resolveCode(k, x)).join(", ");
    } else if (typeof v === "string") {
      if (optionLabels[k]) {
        answersText[k] = resolveCode(k, v);
      } else {
        answersText[k] = v;
      }
    }
  });

  const payload = {
    formType: "brief",
    clientName: CONFIG.clientName,
    submittedAt: new Date().toISOString(),
    user: state.user,
    answers: answersText,
    answersRaw: state.answers,
    answersOther: state.others,
    questionLabels: questionLabels,
    questionSections: questionSections,
    questionOrder: questionOrder
  };

  nextBtn.disabled = true;
  nextBtn.textContent = "Sending";

  fetch(CONFIG.appsScriptUrl, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  })
  .then(() => { state.step++; render(); window.scrollTo({ top: 0, behavior: "smooth" }); })
  .catch(() => { nextBtn.textContent = "Try again"; nextBtn.disabled = false; });
}

render();
</script>
</body>
</html>
